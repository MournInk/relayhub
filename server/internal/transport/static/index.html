<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RelayHub</title>
    <style>
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: #0b1220;
        color: #e5e7eb;
      }
      main {
        max-width: 820px;
        margin: 6rem auto;
        padding: 2rem;
      }
      h1 {
        font-size: 3rem;
        margin: 0 0 1rem;
      }
      p {
        line-height: 1.7;
        color: #cbd5e1;
      }
      code {
        background: rgba(148, 163, 184, 0.15);
        padding: 0.2rem 0.4rem;
        border-radius: 0.4rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>RelayHub</h1>
      <p>Console assets are not bundled in this runtime image yet.</p>
      <p>Set <code>RELAYHUB_CONSOLE_DIR</code> to a built Next.js export directory to serve the full console from the Go backend.</p>
    </main>
  </body>
 </html>
